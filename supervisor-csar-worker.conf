[program:csar-worker]
process_name=%(program_name)s_%(process_num)02d
command=php /var/www/csar/artisan queue:work redis --sleep=3 --tries=3 --max-time=3600
autostart=true
autorestart=true
stopasgroup=true
killasgroup=true
user=www-data
numprocs=8
redirect_stderr=true
stdout_logfile=/var/www/csar/storage/logs/worker.log
stopwaitsecs=3600
startsecs=0

[program:csar-scheduler]
process_name=%(program_name)s
command=/bin/sh -c "while [ true ]; do (php /var/www/csar/artisan schedule:run --verbose --no-interaction &); sleep 60; done"
autostart=true
autorestart=true
user=www-data
redirect_stderr=true
stdout_logfile=/var/www/csar/storage/logs/scheduler.log
